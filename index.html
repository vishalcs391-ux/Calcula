<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Calculator</title><link rel="stylesheet" href="style.css"></head><body><div class="calc"><input id="display" readonly><div class="grid">
<button onclick="clr()">C</button><button onclick="add('/')">/</button><button onclick="add('*')">*</button><button onclick="delc()">⌫</button>
<button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button onclick="add('-')">-</button>
<button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button onclick="add('+')">+</button>
<button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button onclick="eq()" rowspan="2">=</button>
<button onclick="add('0')">0</button><button onclick="add('.')">.</button></div></div><script src="script.js"></script></body></html>
